name: Warm up Render BE

on:
  schedule:
    - cron: "0,13,26,39,52 * * * *"
  workflow_dispatch:

jobs:
  ping-health:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render health endpoint
        run: |
          HEALTH_URL="https://petshopbe.onrender.com/health"
          echo "Pinging: $HEALTH_URL"
          curl --fail --silent --show-error \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 5 \
            --retry-delay 5 \
            --retry-all-errors \
            "$HEALTH_URL"
